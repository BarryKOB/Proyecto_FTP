<VirtualHost *:80>
    ServerName intranet.centro.local
    DocumentRoot /var/www/html/intranet

    <Directory /var/www/html/intranet/public>
        Require all granted
    </Directory>

    <Directory /var/www/html/intranet/profesores>
        AuthType Basic
        AuthName "Acceso Privado Profesores"
        AuthBasicProvider ldap
        AuthLDAPURL "ldap://192.168.1.50/ou=usuarios,dc=centro,dc=local?uid"
        
        AuthLDAPGroupAttribute memberUid
        AuthLDAPGroupAttributeIsDN off
        
        Require ldap-group cn=profesores,ou=grupos,dc=centro,dc=local
    </Directory>

    <Directory /var/www/html/intranet/alumnos>
        AuthType Basic
        AuthName "Acceso Privado Alumnos"
        AuthBasicProvider ldap
        AuthLDAPURL "ldap://192.168.1.50/ou=usuarios,dc=centro,dc=local?uid"
        
        AuthLDAPGroupAttribute memberUid
        AuthLDAPGroupAttributeIsDN off
        
        Require ldap-group cn=alumnos,ou=grupos,dc=centro,dc=local
    </Directory>
</VirtualHost>
